<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="城市一日游 MVP：将精选地点、时间线和地图路线组合成会讲故事的城市漫游体验。"
    />
    <title>漫游日记 · Amsterdam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="#" aria-label="漫游日记首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 36 36">
              <path d="M18 3.5c-6.2 0-11.2 4.8-11.2 10.8 0 8.1 11.2 18.2 11.2 18.2s11.2-10.1 11.2-18.2C29.2 8.3 24.2 3.5 18 3.5Z" />
              <path class="brand-path" d="M11 17c2.8-5.5 6.2 3.6 9.1-1.4 1.5-2.5 3.1-2.4 5-1.7" />
            </svg>
          </span>
          <span>漫游日记</span>
        </a>

        <nav class="primary-nav" aria-label="主导航">
          <button class="nav-item active" data-view="journey">
            <span class="nav-icon" aria-hidden="true">⌁</span>
            今日行程
          </button>
          <button class="nav-item" data-view="discover">
            <span class="nav-icon" aria-hidden="true">◇</span>
            探索城市
          </button>
          <button class="nav-item" data-view="saved">
            <span class="nav-icon" aria-hidden="true">♡</span>
            我的收藏
          </button>
        </nav>

        <div class="sidebar-card">
          <p class="eyebrow">今日天气</p>
          <div class="weather-row">
            <span class="weather-icon">☼</span>
            <div>
              <strong>18°C</strong>
              <span>晴间多云 · 适合步行</span>
            </div>
          </div>
        </div>

        <div class="profile">
          <span class="avatar">Y</span>
          <div>
            <strong>旅行者</strong>
            <span>历史 · 建筑 · 咖啡</span>
          </div>
          <button aria-label="打开个人菜单">•••</button>
        </div>
      </aside>

      <main>
        <header class="topbar">
          <div class="mobile-brand">
            <span class="brand-mark mini" aria-hidden="true">⌖</span>
            <strong>漫游日记</strong>
          </div>
          <button class="city-picker" aria-label="切换城市">
            <span class="flag">🇳🇱</span>
            <span class="city-name">Amsterdam</span>
            <span aria-hidden="true">⌄</span>
          </button>
          <div class="topbar-actions">
            <button class="icon-button" id="locationButton" aria-label="定位到当前位置">⌖</button>
            <button class="icon-button" id="notificationButton" aria-label="查看通知">
              ♢
              <span class="notification-dot"></span>
            </button>
          </div>
        </header>

        <section class="hero">
          <div>
            <p class="date-label">6月6日 · 星期六</p>
            <h1>早上好，准备出发了吗？</h1>
            <p>今天我们沿着运河，读一读阿姆斯特丹的黄金时代。</p>
          </div>
          <div class="progress-card">
            <div class="progress-ring" id="progressRing">
              <span id="progressNumber">1/6</span>
            </div>
            <div>
              <span>今日进度</span>
              <strong id="progressText">已完成 1 个地点</strong>
            </div>
          </div>
        </section>

        <section class="stats-row" aria-label="行程概览">
          <div class="stat">
            <span class="stat-icon coral">↗</span>
            <div><strong>5.8 km</strong><span>步行距离</span></div>
          </div>
          <div class="stat">
            <span class="stat-icon blue">◷</span>
            <div><strong>7 小时</strong><span>预计行程</span></div>
          </div>
          <div class="stat">
            <span class="stat-icon gold">✦</span>
            <div><strong>6 个</strong><span>精选地点</span></div>
          </div>
          <div class="stat">
            <span class="stat-icon green">♧</span>
            <div><strong>轻松</strong><span>路线强度</span></div>
          </div>
        </section>

        <div class="content-grid">
          <section class="journey-panel">
            <div class="section-heading">
              <div>
                <p class="eyebrow">YOUR DAY</p>
                <h2>今日时间线</h2>
              </div>
              <button class="text-button" id="adjustButton">调整行程 <span>→</span></button>
            </div>
            <div class="timeline" id="timeline"></div>
          </section>

          <section class="map-panel">
            <div class="map-toolbar">
              <div>
                <p class="eyebrow">LIVE ROUTE</p>
                <h2>行程地图</h2>
              </div>
              <div class="map-controls">
                <button id="zoomInButton" aria-label="放大地图">+</button>
                <button id="zoomOutButton" aria-label="缩小地图">−</button>
              </div>
            </div>
            <div class="map" id="map">
              <svg class="map-art" viewBox="0 0 660 520" role="img" aria-label="阿姆斯特丹一日游路线地图">
                <rect width="660" height="520" fill="#e9e4d8" />
                <g class="city-blocks">
                  <path d="M0 0h190l-15 80L85 96 0 76Z" />
                  <path d="M215 0h210l-22 63-170 22Z" />
                  <path d="M455 0h205v95l-85-20-133-15Z" />
                  <path d="m0 110 92 8 80 34-24 95L0 218Z" />
                  <path d="m205 108 186-21 22 98-189 37-56-55Z" />
                  <path d="m440 90 146 12 74 35v100l-172-29Z" />
                  <path d="m0 254 139 19 43 104-182 6Z" />
                  <path d="m185 247 231-36 30 124-231 30Z" />
                  <path d="m469 233 191 31v122l-167-44Z" />
                  <path d="m0 409 170-8 44 119H0Z" />
                  <path d="m200 390 253-30 37 160H236Z" />
                  <path d="m510 375 150 35v110H529Z" />
                </g>
                <g class="water">
                  <path d="M-30 181C96 132 117 220 233 170S398 86 700 183" />
                  <path d="M-20 296c110-33 162 50 276 4s233-96 433 11" />
                  <path d="M89-20c39 99-15 151 26 222s17 172 84 338" />
                  <path d="M497-20c-13 92 25 147 1 225s47 165 23 335" />
                </g>
                <g class="streets">
                  <path d="M0 60 660 475M41 0l498 520M660 60 50 487M290 0l-47 520M0 447 660 131" />
                </g>
                <path
                  id="routePath"
                  class="route-path"
                  d="M103 378 C160 342 151 282 217 258 S292 313 347 276 S380 185 445 168 S484 248 530 231 S546 149 589 113"
                />
              </svg>
              <div class="map-pins" id="mapPins"></div>
              <div class="current-location" id="currentLocation" aria-label="当前位置">
                <span></span>
              </div>
              <div class="map-legend">
                <span><i class="legend-dot active"></i> 下一站</span>
                <span><i class="legend-dot done"></i> 已完成</span>
              </div>
              <button class="recenter-button" id="recenterButton" aria-label="回到路线中心">⌖</button>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div class="detail-sheet" id="detailSheet" aria-hidden="true">
      <button class="sheet-backdrop" id="closeSheetBackdrop" aria-label="关闭地点详情"></button>
      <article class="sheet-content">
        <button class="sheet-close" id="closeSheetButton" aria-label="关闭地点详情">×</button>
        <div class="sheet-visual" id="sheetVisual">
          <span class="sheet-category" id="sheetCategory"></span>
          <span class="sheet-number" id="sheetNumber"></span>
        </div>
        <div class="sheet-copy">
          <p class="eyebrow" id="sheetTime"></p>
          <h2 id="sheetTitle"></h2>
          <p class="sheet-subtitle" id="sheetSubtitle"></p>
          <div class="fact-grid" id="sheetFacts"></div>
          <div class="story-block">
            <h3>为什么值得看</h3>
            <p id="sheetStory"></p>
          </div>
          <div class="sheet-actions">
            <button class="secondary-button" id="saveButton">♡ 收藏地点</button>
            <button class="primary-button" id="arriveButton">模拟到达这里</button>
          </div>
        </div>
      </article>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
