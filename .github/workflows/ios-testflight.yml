name: iOS TestFlight Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ios/**"
      - ".github/workflows/ios-testflight.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate iOS app project exists
        run: |
          set -euo pipefail
          if [ -d "ios" ] && [ -n "$(find ios -type d \( -name '*.xcodeproj' -o -name '*.xcworkspace' \) -print -quit)" ]; then
            echo "Found iOS project/workspace under ios/."
          else
            echo "No .xcodeproj or .xcworkspace found under ios/."
            echo "Add the CityTrace iOS app project files to ios/ for TestFlight archive builds."
            exit 1
          fi

      - name: Validate required secrets
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "$IOS_CERTIFICATE_P12" ]        && missing+=("IOS_CERTIFICATE_P12")
          [ -z "$IOS_CERTIFICATE_PASSWORD" ]   && missing+=("IOS_CERTIFICATE_PASSWORD")
          [ -z "$IOS_PROVISION_PROFILE" ]      && missing+=("IOS_PROVISION_PROFILE")
          [ -z "$KEYCHAIN_PASSWORD" ]          && missing+=("KEYCHAIN_PASSWORD")
          [ -z "$APP_STORE_CONNECT_KEY_ID" ]   && missing+=("APP_STORE_CONNECT_KEY_ID")
          [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] && missing+=("APP_STORE_CONNECT_ISSUER_ID")
          [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ] && missing+=("APP_STORE_CONNECT_PRIVATE_KEY")
          [ -z "$APPLE_TEAM_ID" ]              && missing+=("APPLE_TEAM_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: The following GitHub Actions secrets are not set:"
            for s in "${missing[@]}"; do echo "  - $s"; done
            echo ""
            echo "Add them at: https://github.com/hgao168/CityTrace/settings/secrets/actions"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Decode App Store Connect private key
        env:
          KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Decode certificate
        env:
          CERT_B64: ${{ secrets.IOS_CERTIFICATE_P12 }}
        run: |
          set -euo pipefail
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

      - name: Decode provisioning profile
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          set -euo pipefail
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/CityNova.mobileprovision

      - name: Create keychain
        env:
          KEYCHAIN_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
          CERT_PW: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          security create-keychain -p "$KEYCHAIN_PW" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PW" build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" build.keychain

      - name: Determine project and scheme
        run: |
          set -euo pipefail

          scheme="CityTrace"

          if [ -d "ios/CityTrace.xcworkspace" ]; then
            echo "BUILD_TARGET=-workspace ios/CityTrace.xcworkspace" >> "$GITHUB_ENV"
          elif [ -d "ios/CityTrace.xcodeproj" ]; then
            echo "BUILD_TARGET=-project ios/CityTrace.xcodeproj" >> "$GITHUB_ENV"
          else
            workspace_path="$(find ios -type d -name '*.xcworkspace' -print -quit)"
            project_path="$(find ios -type d -name '*.xcodeproj' -print -quit)"

            if [ -n "$workspace_path" ]; then
              echo "BUILD_TARGET=-workspace $workspace_path" >> "$GITHUB_ENV"
            elif [ -n "$project_path" ]; then
              echo "BUILD_TARGET=-project $project_path" >> "$GITHUB_ENV"
            else
              echo "No .xcodeproj or .xcworkspace found under ios/."
              exit 1
            fi
          fi

          echo "IOS_SCHEME=$scheme" >> "$GITHUB_ENV"

      - name: Build archive
        run: |
          set -euo pipefail
          xcodebuild archive \
            $BUILD_TARGET \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export"/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Cleanup keychain and secrets
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8